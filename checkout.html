<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>모듈 신청 — Lunervia</title>
    <meta
      name="description"
      content="선택한 Lunervia 모듈을 확인하고 상담으로 진행합니다. 월간 결제 구조는 준비 중이며, 실제 진행 범위는 상담 후 확정됩니다."
    />
    <link rel="canonical" href="https://lunervia.xyz/checkout.html" />
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#FBFAF7" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%23161616'/%3E%3Ctext x='49%25' y='56%25' text-anchor='middle' dominant-baseline='middle' font-family='Inter,Helvetica,Arial,sans-serif' font-size='34' font-weight='700' fill='%23F7F3EA'%3EL%3C/text%3E%3Ccircle cx='47' cy='19' r='5' fill='%232E5BD6'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />
    <link rel="stylesheet" href="styles.css?v=20260630b" />
  </head>
  <body data-page="checkout">
    <a class="skip-link" href="#checkout-main">본문으로 건너뛰기</a>

    <!-- ============================== TOPBAR ============================== -->
    <header class="nav">
      <div class="nav-inner">
        <a class="brand" href="index.html" aria-label="Lunervia 메인으로">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 32 32" focusable="false">
              <rect x="0.75" y="0.75" width="30.5" height="30.5" rx="10.5" fill="var(--ink)" />
              <path d="M17.4 7.2a9 9 0 1 0 0 17.6 7.1 7.1 0 0 1 0-17.6Z" fill="#F8F5EE" />
              <circle cx="22.6" cy="10.4" r="2" fill="var(--accent)" />
            </svg>
          </span>
          <span class="brand-text">
            <span class="brand-text-main">Lunervia</span>
            <span class="brand-text-kr">루네르비아</span>
          </span>
        </a>
        <nav class="nav-menu" id="nav-menu" aria-label="주 메뉴">
          <a class="nav-link nav-module" href="modules.html" data-i18n="nav.module">모듈</a>
          <a class="nav-link" href="index.html#contact" data-i18n="nav.contact">문의</a>
        </nav>
      </div>
    </header>

    <main class="checkout-page" id="checkout-main">
      <div class="checkout-inner">
        <a class="back-link" href="modules.html">
          <span aria-hidden="true">←</span>
          <span data-ko="모듈로 돌아가기" data-en="Back to modules">모듈로 돌아가기</span>
        </a>

        <section class="checkout-card" id="checkout-card" aria-live="polite">
          <!-- 인라인 렌더러가 채움 -->
        </section>
      </div>
    </main>

    <footer class="footer footer--slim">
      <div class="footer-bottom">
        <div class="footer-bottom-inner">
          <p class="footer-copyright">© 2026 Lunervia. All rights reserved.</p>
          <a class="footer-top-link" href="modules.html" data-i18n="nav.module">모듈</a>
        </div>
      </div>
    </footer>

    <script src="script.js?v=20260630b"></script>

    <script type="module">
      import { getModuleByPlanId } from "./data/modules.js";
      import {
        createSubscriptionDraft,
        getPriceLabel,
      } from "./lib/subscription.js";

      const LANG_KEY = "lunervia-lang";
      const getLang = () =>
        (() => {
          try {
            return localStorage.getItem(LANG_KEY) === "en" ? "en" : "ko";
          } catch (_) {
            return "ko";
          }
        })();

      const esc = (s) =>
        String(s).replace(
          /[&<>"']/g,
          (c) =>
            ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])
        );

      const T = {
        ko: {
          eyebrow: "월간 모듈 신청",
          notFoundTitle: "모듈을 찾을 수 없어요",
          notFoundBody: "주소가 정확하지 않은 것 같습니다. 모듈 목록에서 다시 선택해 주세요.",
          toModules: "모듈 목록 보기",
          summary: "신청 요약",
          plan: "모듈",
          billing: "결제 방식",
          monthly: "월간 결제",
          status: "상태",
          prepping: "월간 결제 준비 중 · 상담 후 확정",
          notice:
            "지금은 카드 자동결제 대신, 상담으로 범위를 맞춘 뒤 진행합니다. 월간 결제 구조는 곧 연결될 예정입니다.",
          contact: "이 모듈로 문의하기",
          back: "다른 모듈 보기",
        },
        en: {
          eyebrow: "Monthly module request",
          notFoundTitle: "We couldn't find that module",
          notFoundBody: "The link looks off. Please pick a module from the list again.",
          toModules: "View modules",
          summary: "Request summary",
          plan: "Module",
          billing: "Billing",
          monthly: "Monthly",
          status: "Status",
          prepping: "Monthly billing in prep · set after a chat",
          notice:
            "For now we shape the scope over a quick chat instead of charging a card. Monthly billing will be connected soon.",
          contact: "Get in touch about this module",
          back: "See other modules",
        },
      };

      function getPlanId() {
        const p = new URLSearchParams(location.search).get("plan");
        return (p || "").trim().toLowerCase();
      }

      function render() {
        const lang = getLang();
        const t = T[lang] || T.ko;
        const card = document.getElementById("checkout-card");
        if (!card) return;

        const mod = getModuleByPlanId(getPlanId());

        if (!mod) {
          card.innerHTML = `
            <p class="checkout-eyebrow mono">${esc(t.eyebrow)}</p>
            <h1 class="checkout-title">${esc(t.notFoundTitle)}</h1>
            <p class="checkout-text">${esc(t.notFoundBody)}</p>
            <a class="modules-cta-button" href="modules.html"><span>${esc(
              t.toModules
            )}</span></a>`;
          return;
        }

        const c = mod.i18n[lang] || mod.i18n.ko;
        const price = getPriceLabel(mod, lang);
        // 결제 draft 는 도메인 로직에서만 만든다(민감정보 없음). 데모용으로 콘솔에만 노출.
        const draft = createSubscriptionDraft(mod.planId);
        // eslint-disable-next-line no-console
        console.debug("[checkout] subscription draft", draft);

        card.innerHTML = `
          <p class="checkout-eyebrow mono"><span class="modules-eyebrow-dot" aria-hidden="true"></span>${esc(
            t.eyebrow
          )}</p>
          <h1 class="checkout-title">${esc(mod.name)}</h1>
          <p class="checkout-text">${esc(c.summary)}</p>

          <dl class="checkout-summary">
            <div class="checkout-row">
              <dt class="mono">${esc(t.plan)}</dt>
              <dd>${esc(mod.name)} <span class="checkout-planid mono">MOD·${esc(
          mod.planId.toUpperCase()
        )}</span></dd>
            </div>
            <div class="checkout-row">
              <dt class="mono">${esc(t.billing)}</dt>
              <dd>${esc(price)}</dd>
            </div>
            <div class="checkout-row">
              <dt class="mono">${esc(t.status)}</dt>
              <dd><span class="checkout-pill">${esc(t.prepping)}</span></dd>
            </div>
          </dl>

          <p class="checkout-notice">${esc(t.notice)}</p>

          <div class="checkout-actions">
            <a class="modules-cta-button" href="index.html#contact"><span>${esc(
              t.contact
            )}</span></a>
            <a class="modules-cta-ghost" href="modules.html"><span>${esc(t.back)}</span></a>
          </div>`;
      }

      document.querySelectorAll(".nav-lang-btn").forEach((btn) =>
        btn.addEventListener("click", () => requestAnimationFrame(render))
      );
      window.addEventListener("storage", (e) => {
        if (e.key === LANG_KEY) render();
      });

      render();
    </script>
  </body>
</html>
